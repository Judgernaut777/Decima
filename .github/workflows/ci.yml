name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev tooling)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Type check (mypy — strict on new package, legacy excluded)
        run: mypy

      - name: Architecture import boundaries (TCB guard)
        run: pytest tests/architecture -q

      - name: Unit / property / conformance / integration tests
        run: pytest -q -m "not adversarial"

      - name: Coverage report
        run: pytest -q --cov=decima --cov-report=term-missing -m "not adversarial"

      - name: Build wheel + sdist
        run: |
          python -m pip install build
          python -m build

  release-metadata:
    name: release-metadata drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (editable + dev tooling)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Version + test/spec count drift guard (offline, collect-only)
        # Fails if pyproject / decima._release / docs disagree on the version, or if the
        # documented pytest / Playwright-spec counts drift from what the tree actually has.
        run: python scripts/check_release_metadata.py -v

  legacy-oracle:
    name: legacy heartbeat oracle (frozen baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime dep
        run: python -m pip install "pynacl>=1.5"
      - name: Run the reference oracle
        # The 221-check smoke suite is the behavioral baseline the 0.3 refactor must not
        # regress. Kept green until the Phase 3 conformance suite supersedes it.
        run: |
          cd heartbeat
          python3 -u smoke.py
