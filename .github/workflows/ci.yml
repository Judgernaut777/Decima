name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Actions are pinned to full commit SHAs (comment = the tag reviewed at pin time): a
# mutable major tag like @v4 lets the action's publisher — or an attacker with their
# token — silently swap the code this workflow runs.

jobs:
  quality:
    name: lint · type · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev tooling)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Type check (mypy — strict bar incl. the kernel; legacy trees excluded)
        run: mypy

      - name: Architecture import boundaries (TCB guard)
        run: pytest tests/architecture -q

      - name: Unit / property / conformance / integration tests (+ coverage gate)
        # ONE pytest run: it used to run twice (plain, then again for coverage) which
        # doubled CI time, and coverage was a report with no floor. The adversarial
        # suite runs in its own lane below.
        # Floor = measured 79.99% at 0.3.1.dev0 minus headroom; ratchet it up, never down.
        run: pytest -q -m "not adversarial" --cov=decima --cov-report=term-missing --cov-fail-under=78

      - name: Build wheel + sdist
        run: |
          python -m pip install build
          python -m build

  adversarial:
    name: adversarial (hostile-input / worker-escape)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (editable + dev tooling)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Adversarial suite
        # A dedicated lane so a containment regression is named as such, not buried in
        # the unit matrix. The marker is applied by tests/adversarial/conftest.py —
        # before 0.3.1 it was registered but attached to nothing, so this filter
        # selected zero tests.
        run: pytest -q -m adversarial

  browser:
    name: rendered-Shell browser suite (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install the package (the fixture server imports decima)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Browser specs
        # The 13-spec rendered-Shell suite was release evidence but ran only on the dev
        # host before 0.3.1 — advertised as a gate, never continuously enforced.
        run: npx playwright test --config playwright.config.js

  release-metadata:
    name: release-metadata drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (editable + dev tooling)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Version + test/spec count drift guard (offline, collect-only)
        # Fails if pyproject / decima._release / docs disagree on the version, if the
        # documented pytest / Playwright-spec counts drift from what the tree actually
        # has, or if the CHANGELOG's Unreleased discipline doesn't match dev/release.
        run: python scripts/check_release_metadata.py -v

  legacy-oracle:
    name: legacy heartbeat oracle (frozen baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime dep
        run: python -m pip install "pynacl>=1.5"
      - name: Run the reference oracle
        # The 221-check smoke suite is the behavioral baseline the 0.3 refactor must not
        # regress. Kept green until the Phase 3 conformance suite supersedes it.
        run: |
          cd heartbeat
          python3 -u smoke.py
